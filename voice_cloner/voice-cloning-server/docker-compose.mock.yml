services:
  voice-api:
    build:
      context: .
      dockerfile: Dockerfile.mock  # 使用轻量级 Mock 版本
    container_name: voice-cloning-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env.production
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - voice-network
    # 资源限制（适配低配服务器 2核1GB）
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 900M  # 留 100M 给系统
        reservations:
          cpus: '0.5'
          memory: 256M

networks:
  voice-network:
    driver: bridge
